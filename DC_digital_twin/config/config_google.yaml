simulator:
  name: "Rack_001"
  time_step: 1.0  # секунд
  realtime_factor: 10.0  # ускорение в 10 раз

rack:
  height: 2.0  # метры
  width: 0.8
  depth: 1.2
  num_units: 42
  containment: "hot_aisle"  # hot_aisle / cold_aisle / none

servers:
  default_profile: "dl380"
  count: 42
  arrangement: "uniform"  # равномерно по стойке
  profiles:
    dl380:
      p_idle: 150
      p_max: 400
      t_max: 85
      c_thermal: 5000
      m_dot: 0.05

cooling:
  crac:
    type: "chilled_water"
    capacity: 30000  # Вт
    cop_curve: [0.002, -0.15, 4.0]  # a, b, c для COP(T)
    default_setpoint: 22.0
  fans:
    max_power: 2000
    law: "cubic"

room:
  volume: 100  # м³
  wall_heat_transfer: 50  # Вт/К
  enthalpy_mixing_efficiency: 0.2
  initial_temperature: 22.0

load_generator:
  type: "dataset"
  dataset_path: "data/google2019_load.csv"
  random_seed: 42

mqtt:
  enabled: false  # пока отключим для теста
  broker: "localhost"
  port: 1883
  topic_prefix: "dc/sim/rack_001"
  publish_rate: 1.0  # Гц
  qos: 1

output:
  enabled: true
  format: "csv"  # csv / parquet / json
  path: "results"
  save_interval: 100  # сохранять каждые N шагов
  compression: true

logging:
  level: "INFO"
  format: "json"
  file: "logs/simulator.log"
