simulator:
  name: "Rack_001"
  time_step: 300.0  # 5 минут
  realtime_factor: 10.0

rack:
  height: 2.0
  width: 0.8
  depth: 1.2
  num_units: 42
  containment: "hot_aisle"

servers:
  default_profile: "dl380"
  count: 42
  arrangement: "uniform"
  profiles:
    dl380:
      # Ожидаемо: меньшее охлаждение и выше тепловыделение
      p_idle: 150
      p_max: 2000
      t_max: 85
      c_thermal: 5000
      m_dot: 0.001

cooling:
  crac:
    type: "chilled_water"
    # Ограничиваем максимальную охлаждающую мощность
    capacity: 5000
    cop_curve: [0.002, -0.15, 4.0]
    # Повышаем setpoint => меньше дельта => меньше охлаждение
    default_setpoint: 27.0
  fans:
    max_power: 2000
    law: "cubic"

room:
  volume: 100
  wall_heat_transfer: 50
  enthalpy_mixing_efficiency: 0.2
  initial_temperature: 22.0

load_generator:
  type: "dataset"
  dataset_path: "data/google2019_load_300s.csv"
  random_seed: 42

mqtt:
  enabled: false
  broker: "localhost"
  port: 1883
  topic_prefix: "dc/sim/rack_001"
  publish_rate: 1.0
  qos: 1

output:
  enabled: true
  format: "csv"
  path: "results_google_overheat_300s"
  save_interval: 100
  compression: true

logging:
  level: "INFO"
  format: "json"
  file: "logs/simulator.log"

